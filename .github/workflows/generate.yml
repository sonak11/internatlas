name: Regenerate views

on:
  push:
    branches: [main]
    paths: ["data/**", "archive/**", "src/**", "docs/README.template.md", "docs/tips/**"]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: generate
  cancel-in-progress: true

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -e .
      - run: internatlas generate
      - name: Commit regenerated views
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md generated/
          git diff --cached --quiet && echo "No changes." && exit 0
          git commit -m "chore: regenerate views [skip ci]"
          git push
