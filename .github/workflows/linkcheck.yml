name: Dead link check

on:
  schedule:
    - cron: "17 6 * * 1,4"   # Mon + Thu, 06:17 UTC
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  linkcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -e .
      - name: Check apply URLs
        id: check
        continue-on-error: true
        run: internatlas linkcheck | tee linkcheck.log
      - name: Open issue on dead links
        if: steps.check.outcome == 'failure'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const log = fs.readFileSync('linkcheck.log', 'utf8');
            await github.rest.issues.create({
              ...context.repo,
              title: `🔗 Dead links detected — ${new Date().toISOString().slice(0,10)}`,
              labels: ['dead-link', 'help wanted'],
              body: 'The scheduled link checker found dead apply URLs. Please PR fixes '
                  + '(set `status: closed` to archive a listing).\n\n```\n' + log + '\n```',
            });
