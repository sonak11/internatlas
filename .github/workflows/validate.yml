name: Validate data

on:
  pull_request:
    paths: ["data/**", "archive/**", "src/**", "schemas/**", "tests/**"]
  push:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -e .[dev]
      - name: Schema + cross-file validation (includes duplicate detection)
        run: internatlas validate
      - name: Unit tests
        run: pytest -q
      - name: Fail if schema export is stale
        run: |
          internatlas schema
          git diff --exit-code schemas/ || {
            echo "::error::schemas/internship.schema.json is out of date. Run 'internatlas schema' and commit."; exit 1; }
