name: Weekly digest

on:
  schedule:
    - cron: "0 13 * * 1"   # Mondays 13:00 UTC
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: weekly-digest
  cancel-in-progress: false

jobs:
  digest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -e .

      - name: Rebuild digest & exports, then push
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          branch="${GITHUB_REF_NAME}"
          for attempt in 1 2 3 4 5; do
            git fetch --quiet origin "$branch"
            git reset --hard "origin/$branch"
            internatlas generate
            git add README.md generated/
            if git diff --cached --quiet; then
              echo "No changes."
              exit 0
            fi
            git commit -m "chore: weekly digest $(date -u +%F) [skip ci]"
            if git push origin "HEAD:$branch"; then
              echo "Pushed on attempt $attempt."
              exit 0
            fi
            echo "Push rejected — rebuilding on fresh main."
            sleep $((RANDOM % 6 + 3))
          done
          echo "::error::Could not push after 5 attempts."
          exit 1
