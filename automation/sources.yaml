# ─────────────────────────────────────────────────────────────────────────────
# Live sources for the hourly sync (`internatlas sync`).
#
# Two kinds of sources:
#
#   sources:  direct ATS boards — public, keyless JSON APIs (PRIMARY)
#     greenhouse → https://boards-api.greenhouse.io/v1/boards/<token>/jobs
#     lever      → https://api.lever.co/v0/postings/<token>?mode=json
#     ashby      → https://api.ashbyhq.com/posting-api/job-board/<token>
#
#   feeds:    community-maintained listings.json files (SECONDARY, attributed)
#     These cover companies whose ATSes have no public API (Workday, Taleo,
#     in-house portals). Every listing ingested from a feed is tagged
#     `src:<label>` and credited in the README + SOURCES.md.
#
# To add a company: find its board token (it's in the URL of their job board,
# e.g. boards.greenhouse.io/<token>, jobs.lever.co/<token>,
# jobs.ashbyhq.com/<token>), add an entry, open a PR.
#
# ⚠️ Tokens are best-effort and easy to fix: a wrong token fails softly — the
#    sync logs "<company>: fetch failed" and moves on. If you see that in the
#    Actions log, verify the token on the company's job board and PR the fix.
# ─────────────────────────────────────────────────────────────────────────────

