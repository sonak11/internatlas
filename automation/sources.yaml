# ─────────────────────────────────────────────────────────────────────────────
# Live ATS sources for the hourly sync (`internatlas sync`).
#
# ats: greenhouse → https://boards-api.greenhouse.io/v1/boards/<token>/jobs
# ats: lever      → https://api.lever.co/v0/postings/<token>?mode=json
#
# Both are public, keyless APIs. To add a company: find its board token (it's
# in the URL of their job board, e.g. boards.greenhouse.io/<token> or
# jobs.lever.co/<token>), add an entry, open a PR. A wrong token fails softly —
# the sync logs it and moves on.
#
# ⚠️ Tokens below are best-effort and easy to fix: if a company's sync logs
#    "fetch failed", verify the token on their job board and PR the correction.
# ─────────────────────────────────────────────────────────────────────────────
sources:
